<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로또 번호 추첨기</title>
    <script>
      (() => {
        const savedTheme = localStorage.getItem('theme');
        const theme = savedTheme || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.dataset.theme = theme;
      })();
    </script>
    <style>
      :root {
        color-scheme: light;
        --bg-start: #f8fafc;
        --bg-end: #e2e8f0;
        --card: rgba(255, 255, 255, 0.94);
        --text: #0f172a;
        --sub: #64748b;
        --border: rgba(15, 23, 42, 0.1);
        --secondary-border: rgba(15, 23, 42, 0.2);
        --shadow: rgba(15, 23, 42, 0.16);
        --accent: #f59e0b;
      }

      :root[data-theme="dark"] {
        color-scheme: dark;
        --bg-start: #0f172a;
        --bg-end: #111827;
        --card: rgba(31, 41, 55, 0.95);
        --text: #f9fafb;
        --sub: #9ca3af;
        --border: rgba(255, 255, 255, 0.08);
        --secondary-border: rgba(255, 255, 255, 0.2);
        --shadow: rgba(0, 0, 0, 0.3);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Pretendard", "Segoe UI", sans-serif;
        background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        transition: background 0.25s ease, color 0.25s ease;
      }

      .app {
        width: min(100%, 720px);
        position: relative;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 24px;
        box-shadow: 0 24px 80px var(--shadow);
        padding: 32px;
        text-align: center;
        transition: background 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
      }

      .theme-toggle {
        position: absolute;
        top: 20px;
        right: 20px;
        width: 44px;
        height: 44px;
        padding: 0;
        display: grid;
        place-items: center;
        background: transparent;
        color: var(--text);
        border: 1px solid var(--secondary-border);
        font-size: 1.25rem;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 2rem;
        padding: 0 48px;
      }

      p {
        margin: 0 0 24px;
        color: var(--sub);
      }

      .numbers {
        display: flex;
        justify-content: center;
        gap: 14px;
        flex-wrap: wrap;
        margin: 28px 0;
      }

      .ball {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        font-size: 1.4rem;
        font-weight: 700;
        color: white;
        box-shadow: inset 0 -8px 12px rgba(0, 0, 0, 0.18);
      }

      .ball:nth-child(1) { background: linear-gradient(145deg, #fbbf24, #d97706); }
      .ball:nth-child(2) { background: linear-gradient(145deg, #60a5fa, #2563eb); }
      .ball:nth-child(3) { background: linear-gradient(145deg, #34d399, #059669); }
      .ball:nth-child(4) { background: linear-gradient(145deg, #fb923c, #ea580c); }
      .ball:nth-child(5) { background: linear-gradient(145deg, #a78bfa, #7c3aed); }
      .ball:nth-child(6) { background: linear-gradient(145deg, #f472b6, #db2777); }

      .button-row {
        display: flex;
        justify-content: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      button {
        border: 0;
        cursor: pointer;
        font-size: 1rem;
        font-weight: 700;
        border-radius: 999px;
        padding: 12px 20px;
        transition: transform 0.2s ease, opacity 0.2s ease;
      }

      button:hover {
        transform: translateY(-2px);
      }

      button:focus-visible {
        outline: 3px solid var(--accent);
        outline-offset: 3px;
      }

      .primary {
        background: var(--accent);
        color: #111827;
      }

      .secondary {
        background: transparent;
        color: var(--text);
        border: 1px solid var(--secondary-border);
      }

      .hint {
        margin-top: 18px;
        font-size: 0.95rem;
        color: var(--sub);
      }

      .empty {
        min-height: 72px;
        display: grid;
        place-items: center;
        color: var(--sub);
        font-size: 1rem;
      }

      .contact {
        margin-top: 32px;
        padding-top: 28px;
        border-top: 1px solid var(--border);
        text-align: left;
      }

      .contact h2 {
        margin: 0 0 8px;
        text-align: center;
        font-size: 1.4rem;
      }

      .contact > p {
        margin-bottom: 22px;
        text-align: center;
      }

      .contact-form {
        display: grid;
        gap: 16px;
      }

      .form-field {
        display: grid;
        gap: 7px;
      }

      label {
        font-weight: 700;
        font-size: 0.95rem;
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid var(--secondary-border);
        border-radius: 12px;
        padding: 12px 14px;
        background: transparent;
        color: var(--text);
        font: inherit;
      }

      textarea {
        min-height: 130px;
        resize: vertical;
      }

      input:focus-visible,
      textarea:focus-visible {
        outline: 3px solid var(--accent);
        outline-offset: 2px;
        border-color: transparent;
      }

      .contact-form .primary {
        justify-self: center;
        min-width: 150px;
      }

      .honeypot {
        position: absolute;
        left: -9999px;
      }

      @media (max-width: 520px) {
        .app { padding: 76px 20px 28px; }
        h1 { padding: 0; }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <button class="theme-toggle" id="themeToggle" type="button" aria-label="다크 모드로 전환" title="다크 모드로 전환">
        <span aria-hidden="true">🌙</span>
      </button>
      <h1>로또 번호 추첨기</h1>
      <p>클릭 한 번으로 오늘의 행운의 번호를 뽑아보세요.</p>

      <div id="numberArea" class="numbers">
        <div class="empty">아직 추첨되지 않았어요.</div>
      </div>

      <div class="button-row">
        <button class="primary" id="drawBtn">번호 추첨하기</button>
        <button class="secondary" id="resetBtn">초기화</button>
      </div>

      <div class="hint">중복 없이 1부터 45까지의 숫자 6개를 뽑습니다.</div>

      <section class="contact" aria-labelledby="contactTitle">
        <h2 id="contactTitle">제휴 문의</h2>
        <p>제휴 제안이나 협업 문의를 남겨주세요.</p>

        <form class="contact-form" action="https://formspree.io/f/xvzjyegk" method="POST">
          <input type="hidden" name="_subject" value="로또 번호 추첨기 제휴 문의" />

          <div class="form-field">
            <label for="contactName">이름</label>
            <input id="contactName" name="name" type="text" autocomplete="name" required />
          </div>

          <div class="form-field">
            <label for="contactEmail">이메일</label>
            <input id="contactEmail" name="email" type="email" autocomplete="email" required />
          </div>

          <div class="form-field">
            <label for="contactMessage">문의 내용</label>
            <textarea id="contactMessage" name="message" placeholder="제휴 내용을 입력해 주세요." required></textarea>
          </div>

          <div class="honeypot" aria-hidden="true">
            <label for="companyWebsite">회사 웹사이트</label>
            <input id="companyWebsite" name="_gotcha" type="text" tabindex="-1" autocomplete="off" />
          </div>

          <button class="primary" type="submit">문의 보내기</button>
        </form>
      </section>
    </main>

    <script>
      const drawBtn = document.getElementById('drawBtn');
      const resetBtn = document.getElementById('resetBtn');
      const numberArea = document.getElementById('numberArea');
      const themeToggle = document.getElementById('themeToggle');

      function updateThemeButton(theme) {
        const isDark = theme === 'dark';
        const label = isDark ? '화이트 모드로 전환' : '다크 모드로 전환';
        themeToggle.querySelector('span').textContent = isDark ? '☀️' : '🌙';
        themeToggle.setAttribute('aria-label', label);
        themeToggle.title = label;
      }

      function setTheme(theme) {
        document.documentElement.dataset.theme = theme;
        localStorage.setItem('theme', theme);
        updateThemeButton(theme);
      }

      updateThemeButton(document.documentElement.dataset.theme);

      themeToggle.addEventListener('click', () => {
        const nextTheme = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
        setTheme(nextTheme);
      });

      function drawNumbers() {
        const numbers = new Set();

        while (numbers.size < 6) {
          numbers.add(Math.floor(Math.random() * 45) + 1);
        }

        const sorted = [...numbers].sort((a, b) => a - b);
        renderNumbers(sorted);
      }

      function renderNumbers(numbers) {
        numberArea.innerHTML = '';

        numbers.forEach((number) => {
          const ball = document.createElement('div');
          ball.className = 'ball';
          ball.textContent = number;
          numberArea.appendChild(ball);
        });
      }

      drawBtn.addEventListener('click', drawNumbers);
      resetBtn.addEventListener('click', () => {
        numberArea.innerHTML = '<div class="empty">아직 추첨되지 않았어요.</div>';
      });
    </script>
  </body>
</html>
