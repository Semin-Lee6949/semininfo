name: Sync youth data

on:
  workflow_dispatch:
  schedule:
    - cron: '17 21 * * *'

permissions:
  contents: write

concurrency:
  group: sync-youth-data-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Fetch Ontong Youth data
        env:
          YOUTH_POLICY_API_KEY: ${{ secrets.YOUTH_POLICY_API_KEY }}
          YOUTH_CONTENT_API_KEY: ${{ secrets.YOUTH_CONTENT_API_KEY }}
          HOUSING_SUBSCRIPTION_API_KEY: ${{ secrets.HOUSING_SUBSCRIPTION_API_KEY }}
          HOUSING_SUBSCRIPTION_API_URL: ${{ secrets.HOUSING_SUBSCRIPTION_API_URL }}
        run: node scripts/sync-data.mjs
      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "No data changes to commit"
            exit 0
          fi
          git commit -m "Update youth policy data"
          git pull --rebase origin main
          git push origin HEAD:main
